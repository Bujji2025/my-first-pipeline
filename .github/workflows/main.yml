name: Java CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile
        run: echo "Compiling Java project..."

      - name: Run Tests
        run: echo "Running tests..."

      - name: Build JAR
        run: echo "Building JAR..."
